<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Twitter</title>
    <style>
        /* Базовые переменные для тем (по умолчанию Темная) */
        :root {
            --bg-color: #15202b;
            --card-bg: #192734;
            --text-color: #fff;
            --border-color: #38444d;
            --text-muted: #8899a6;
            --input-bg: #15202b;
        }

        /* Класс для Светлой темы */
        body.light-theme {
            --bg-color: #e6ecf0;
            --card-bg: #ffffff;
            --text-color: #14171a;
            --border-color: #ccd6dd;
            --text-muted: #657786;
            --input-bg: #f5f8fa;
        }

        body { 
            font-family: Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 90px 20px 20px 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Хедер */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            background-color: var(--card-bg); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }
        .header-left { display: flex; align-items: center; min-width: 120px; gap: 10px; }
        .header-right { display: flex; align-items: center; min-width: 160px; justify-content: flex-end; gap: 10px; }
        
        /* Кнопка переключения темы */
        .btn-theme-toggle {
            background-color: transparent;
            color: #1da1f2;
            border: 1px solid #1da1f2;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-theme-toggle:hover {
            background-color: rgba(29,161,242,0.1);
        }

        /* Селектор языков */
        #language-selector {
            padding: 8px 14px;
            border-radius: 20px;
            border: 2px solid #1da1f2;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
        }
        #language-selector:hover {
            background-color: rgba(29,161,242,0.15);
            border-color: #0d8bd9;
        }
        #language-selector:focus {
            outline: none;
            border-color: #0d8bd9;
            background-color: rgba(29,161,242,0.08);
        }
        #language-selector option {
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 13px;
            padding: 8px;
        }
        
        /* Элементы меню и кнопок */
        .user-badge { background-color: #adff2f; color: #15202b; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; text-align: center; }
        body.light-theme .user-badge { background-color: #7acc00; color: #fff; }

        .btn-login-trigger { background-color: transparent; color: #1da1f2; border: 2px solid #1da1f2; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-login-trigger:hover { background-color: rgba(29,161,242,0.1); }
        .btn-logout { background-color: #ff6b6b; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-logout:hover { background-color: #ff4c4c; }

        /* Вкладки навигации по центру хедера */
        .nav-tabs { display: flex; gap: 8px; }
        .nav-tabs button { background: transparent; color: var(--text-muted); border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .nav-tabs button:hover { background-color: rgba(29,161,242,0.1); color: #1da1f2; }
        .nav-tabs button.active { background-color: #1da1f2; color: white; }

        /* Карточки и посты */
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); transition: background-color 0.3s, border-color 0.3s; }
        h2, h3 { margin-top: 0; color: #1da1f2; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg); color: var(--text-color); transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        input:focus, textarea:focus { border-color: #1da1f2; outline: none; }
        
        button.btn-primary { background-color: #1da1f2; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button.btn-primary:hover { background-color: #1991db; }

        .tweet { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); transition: background-color 0.3s, border-color 0.3s; }
        .tweet-author { font-weight: bold; color: #1da1f2; cursor: pointer; }
        .tweet-author:hover { text-decoration: underline; }
        .user-stats { font-size: 11px; color: var(--text-muted); margin-left: 5px; background: var(--input-bg); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tweet-time { font-size: 12px; color: var(--text-muted); margin-left: 10px; }
        .tweet-content { margin-top: 8px; color: var(--text-color); margin-bottom: 10px; line-height: 1.4; }
        
        .tweet-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 1px solid var(--border-color); }

        .like-btn, .reply-btn { background: var(--input-bg); color: var(--text-muted); padding: 6px 12px; font-size: 13px; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; margin-right: 5px; transition: background-color 0.3s; }
        .like-btn:hover { background-color: rgba(224,36,94,0.1); color: #e0245e; border-color: #e0245e; }
        
        .profile-header { text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .profile-counters { display: flex; justify-content: center; gap: 20px; font-weight: bold; color: var(--text-muted); margin-top: 10px; }
    </style>
</head>
<body>

<script src="i18n.js"></script>

<header>
    <div class="header-left" id="header-auth-left">
        </div>

    <div class="nav-tabs">
        <button id="tab-feed" class="active" onclick="switchTab('feed')">Общая лента</button>
        <button id="tab-my-feed" onclick="switchTab('my-feed')">Моя лента</button>
        <button id="tab-profile" onclick="viewMyProfile()">Профиль</button>
        <button id="tab-notifications" onclick="switchTab('notifications')">Уведомления</button>
    </div>

    <div class="header-right">
        <select id="language-selector" onchange="setLanguage(this.value)">
            <option value="ru">🇷🇺 Русский</option>
            <option value="en">🇬🇧 English</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="es">🇪🇸 Español</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="he">🇮🇱 עברית</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="uk">🇺🇦 Українська</option>
            <option value="ko">🇰🇷 한국어</option>
        </select>
        <button class="btn-theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
        <span id="header-auth-right"></span>
    </div>
</header>

<div class="container">

    <div id="tweet-box-section">
        <div class="card">
            <h2>Написать твит</h2>
            <textarea id="tweet-content" placeholder="Что нового? Напиши @username!"></textarea>
            <input type="text" id="tweet-image" placeholder="Вставь ссылку на картинку (опционально)">
            <button class="btn-primary" onclick="createTweet()">Твитнуть</button>
        </div>
    </div>

    <div class="card" id="auth-section" style="display: none;">
        <h2>Вход / Регистрация</h2>
        <div>
            <input type="text" id="reg-username" placeholder="Никнейм (только для регистрации)">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Пароль">
            <button class="btn-primary" onclick="register()">Создать аккаунт</button>
            <button class="btn-primary" onclick="login()" style="background-color: #55b485; margin-left: 10px;">Войти</button>
        </div>
    </div>

    <div id="feed-section">
        <h2 id="feed-title">Общая лента</h2>
        <div id="tweets-feed"></div>
    </div>

    <div id="profile-section" style="display: none;">
        <div class="card">
            <div class="profile-header">
                <h2 id="profile-name">@username</h2>
                <button id="follow-btn" onclick="toggleFollow()" style="display: none; background-color: #1da1f2; color:#fff; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer;">Подписаться</button>
                <div class="profile-counters">
                    <div>Подписчики: <span id="cnt-followers">0</span></div>
                    <div>Подписки: <span id="cnt-following">0</span></div>
                </div>
            </div>
            <h3>Посты пользователя</h3>
            <div id="profile-tweets"></div>
        </div>
    </div>

    <div id="notifications-section" style="display: none;">
        <h2>Ваши сообщения и упоминания</h2>
        <div id="notifications-feed"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api';
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let activeProfileId = null; 
    let currentTab = 'feed';

    // Инициализация языка
    if (currentLanguage) {
        document.getElementById('language-selector').value = currentLanguage;
    }

    // Функция переключения темы Light / Dark
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        
        if (body.classList.contains('light-theme')) {
            body.classList.remove('light-theme');
            btn.innerText = '☀️ Light';
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.add('light-theme');
            btn.innerText = '🌙 Dark';
            localStorage.setItem('theme', 'light');
        }
    }

    // Восстановление темы при загрузке страницы
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('theme-btn').innerText = '🌙 Dark';
    }

    function formatTime(dateString) {
        const now = new Date();
        const past = new Date(dateString);
        const diffInSeconds = Math.floor((now - past) / 1000);
        if (diffInSeconds < 10) return t('just-now');
        if (diffInSeconds < 60) return `${diffInSeconds} ${t('seconds-ago')}`;
        const diffInMinutes = Math.floor(diffInSeconds / 60);
        if (diffInMinutes < 60) return `${diffInMinutes} ${t('minutes-ago')}`;
        const diffInHours = Math.floor(diffInMinutes / 60);
        if (diffInHours < 24) return `${diffInHours} ${t('hours-ago')}`;
        return past.toLocaleDateString();
    }

    function switchTab(tab) {
        currentTab = tab;
        
        document.getElementById('feed-section').style.display = (tab === 'feed' || tab === 'my-feed') ? 'block' : 'none';
        document.getElementById('profile-section').style.display = tab === 'profile' ? 'block' : 'none';
        document.getElementById('notifications-section').style.display = tab === 'notifications' ? 'block' : 'none';
        document.getElementById('auth-section').style.display = tab === 'auth' ? 'block' : 'none';
        document.getElementById('tweet-box-section').style.display = (tab === 'feed' || tab === 'my-feed') ? 'block' : 'none';

        document.getElementById('tab-feed').className = tab === 'feed' ? 'active' : '';
        document.getElementById('tab-my-feed').className = tab === 'my-feed' ? 'active' : '';
        document.getElementById('tab-profile').className = tab === 'profile' ? 'active' : '';
        document.getElementById('tab-notifications').className = tab === 'notifications' ? 'active' : '';

        if (tab === 'feed') {
            document.getElementById('feed-title').innerText = t('general-feed');
            loadTweets();
        }
        if (tab === 'my-feed') {
            document.getElementById('feed-title').innerText = t('my-feed-title');
            loadMyFeed();
        }
        if (tab === 'notifications') loadNotifications();
    }

    function updateAuthUI() {
        const leftAuth = document.getElementById('header-auth-left');
        const rightAuth = document.getElementById('header-auth-right');

        if (currentUser) {
            leftAuth.innerHTML = `<div class="user-badge" style="cursor:pointer;" onclick="viewMyProfile()">@${currentUser.username}</div>`;
            rightAuth.innerHTML = `<button class="btn-logout" onclick="logout()">Выйти</button>`;
        } else {
            leftAuth.innerHTML = `<button class="btn-login-trigger" onclick="switchTab('auth')">Войти</button>`;
            rightAuth.innerHTML = '';
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateAuthUI();
        switchTab('feed');
    }

    function renderTweetsList(tweets, targetElementId, isProfileView = false) {
        try {
            const feed = document.getElementById(targetElementId);
            if (!feed) {
                console.error(`Element with ID "${targetElementId}" not found`);
                return;
            }
            
            feed.innerHTML = '';

            if(tweets.length === 0) {
                feed.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding: 20px;">${t('no-posts')}</p>`;
                return;
            }

            tweets.forEach(tweet => {
                const tweetsCount = tweet.user_tweets_count !== undefined ? tweet.user_tweets_count : 0;
                const notesCount = tweet.user_notifications_count !== undefined ? tweet.user_notifications_count : 0;
                
                let imgHtml = '';
                if (tweet.image_url) {
                    imgHtml = `<img src="${tweet.image_url}" class="tweet-img" onerror="this.style.display='none'">`;
                }

                const tweetDiv = document.createElement('div');
                tweetDiv.className = 'tweet';
                tweetDiv.innerHTML = `
                    <span class="tweet-author" onclick="viewProfile(${tweet.user_id})">@${tweet.username}</span>
                    ${!isProfileView ? `<span class="user-stats">📊 ${t('posts')}: ${tweetsCount} | 📨 ${t('notifications-count')}: ${notesCount}</span>` : ''}
                    <span class="tweet-time">${formatTime(tweet.created_at)}</span>
                    <div class="tweet-content">${tweet.content}</div>
                    ${imgHtml}
                    <div style="margin-top:10px;">
                        <button class="like-btn" onclick="toggleLike(${tweet.id}, ${isProfileView})">❤️ ${tweet.likes_count || 0}</button>
                    </div>
                `;
                feed.appendChild(tweetDiv);
            });
        } catch (e) {
            console.error('Error in renderTweetsList:', e);
        }
    }

    async function loadTweets() {
        try {
            const response = await fetch(`${API_URL}/tweets`);
            const tweets = await response.json();
            renderTweetsList(tweets, 'tweets-feed', false);
        } catch (e) { console.error(e); }
    }

    async function loadMyFeed() {
        if (!currentUser) {
            document.getElementById('tweets-feed').innerHTML = `<p style="text-align:center; color:var(--text-muted); padding: 20px;">${t('login-to-feed')}</p>`;
            return;
        }
        try {
            const response = await fetch(`${API_URL}/tweets/feed/${currentUser.id}`);
            const tweets = await response.json();
            renderTweetsList(tweets, 'tweets-feed', false);
        } catch (e) { console.error(e); }
    }

    async function viewProfile(userId) {
        activeProfileId = userId;
        
        try {
            const resProf = await fetch(`${API_URL}/users/${userId}/profile`);
            const profile = await resProf.json();
            
            // Switch tab AFTER fetching to ensure elements exist
            switchTab('profile');
            
            // Small delay to ensure DOM is ready
            await new Promise(r => setTimeout(r, 50));
            
            // Use safer element access with null checks
            const profileNameEl = document.getElementById('profile-name');
            const cntFollowersEl = document.getElementById('cnt-followers');
            const cntFollowingEl = document.getElementById('cnt-following');
            
            if (profileNameEl) profileNameEl.innerText = `@${profile.username}`;
            if (cntFollowersEl) cntFollowersEl.innerText = profile.followers;
            if (cntFollowingEl) cntFollowingEl.innerText = profile.following;

            // Update profile section heading
            const profileH3 = document.querySelector('#profile-section h3');
            if (profileH3) profileH3.textContent = t('user-posts');

            const followBtn = document.getElementById('follow-btn');
            if (followBtn) {
                if (currentUser && currentUser.id !== userId) {
                    followBtn.style.display = 'inline-block';
                    followBtn.textContent = t('follow-btn');
                } else {
                    followBtn.style.display = 'none';
                }
            }

            const resTweets = await fetch(`${API_URL}/users/${userId}/tweets`);
            const tweets = await resTweets.json();
            console.log('Profile tweets fetched:', tweets.length, 'tweets');
            renderTweetsList(tweets, 'profile-tweets', true);
        } catch (e) { console.error('Error loading profile:', e); }
    }

    function viewMyProfile() {
        if (!currentUser) return alert(t('alert-login-profile'));
        viewProfile(currentUser.id);
    }

    async function toggleFollow() {
        if (!currentUser) return alert(t('alert-login-follow'));
        await fetch(`${API_URL}/follow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ follower_id: currentUser.id, following_id: activeProfileId })
        });
        viewProfile(activeProfileId);
    }

    async function loadNotifications() {
        if (!currentUser) {
            document.getElementById('notifications-feed').innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted);">${t('login-to-comment')}</p>`;
            return;
        }
        try {
            const response = await fetch(`${API_URL}/notifications/${currentUser.id}`);
            const notes = await response.json();
            const feed = document.getElementById('notifications-feed');
            feed.innerHTML = '';

            if (notes.length === 0) {
                feed.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted);">${t('no-mentions')}</p>`;
                return;
            }

            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'tweet';
                div.style.borderLeft = '4px solid #1da1f2';
                div.innerHTML = `
                    <p>${t('mentioned-you')} <span class="tweet-author" onclick="viewProfile(${note.author_id})">@${note.username}</span>:</p>
                    <div class="tweet-content"><em>${note.content}</em></div>
                    <button class="reply-btn" onclick="replyTo('${note.username}')">↩️ ${t('reply')}</button>
                `;
                feed.appendChild(div);
            });
        } catch(e) { console.error(e); }
    }

    function replyTo(username) {
        switchTab('feed');
        document.getElementById('tweet-content').value = `@${username} `;
        document.getElementById('tweet-content').focus();
    }

    async function toggleLike(tweetId, isProfile = false) {
        if (!currentUser) return alert(t('alert-login-like'));
        await fetch(`${API_URL}/likes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: currentUser.id, tweet_id: tweetId })
        });
        if (isProfile) viewProfile(activeProfileId); 
        else if (currentTab === 'my-feed') loadMyFeed();
        else loadTweets();
    }

    async function createTweet() {
        if (!currentUser) return alert(t('alert-login-tweet'));
        const content = document.getElementById('tweet-content').value;
        const image_url = document.getElementById('tweet-image').value;
        if (!content) return alert(t('alert-empty-tweet'));

        await fetch(`${API_URL}/tweets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: currentUser.id, content, image_url })
        });
        document.getElementById('tweet-content').value = '';
        document.getElementById('tweet-image').value = '';
        if (currentTab === 'my-feed') loadMyFeed(); else loadTweets();
    }

    async function register() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const response = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        if (response.ok) {
            login(email, password);
        } else {
            alert((await response.json()).error);
        }
    }

    async function login(emailParam, passwordParam) {
        const email = emailParam || document.getElementById('reg-email').value;
        const password = passwordParam || document.getElementById('reg-password').value;
        
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateAuthUI();
                switchTab('feed');
            } else {
                alert((await response.json()).error);
            }
        } catch(e) { console.error(e); }
    }

    loadTweets();
    updateAuthUI();
    updatePageLanguage();
    setInterval(() => {
        if (currentTab === 'feed') loadTweets();
        if (currentTab === 'my-feed') loadMyFeed();
    }, 10000);
</script>
</body>
</html>
