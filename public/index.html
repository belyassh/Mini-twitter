<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER TWITTER & PROGNOSIS</title>
    <style>
        /* Киберспортивная Темная Тема */
        :root {
            --bg-color: #0b0e11; 
            --card-bg: rgba(21, 26, 33, 0.9); 
            --text-color: #f5f7fa;
            --border-color: #222b36;
            --text-muted: #7b8896;
            --input-bg: #0b0e11;
            --primary-color: #00ffa3; 
            --primary-glow: rgba(0, 255, 163, 0.25);
            --accent-red: #ff3366;
        }

        /* Светлая тема */
        body.light-theme {
            --bg-color: #ebf0f5;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #14171a;
            --border-color: #ccd6dd;
            --text-muted: #657786;
            --input-bg: #ffffff;
            --primary-color: #00b371;
            --primary-glow: rgba(0, 179, 113, 0.2);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 90px 15px 30px 15px;
            transition: background-color 0.3s, color 0.3s;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 163, 0.05) 0%, transparent 70%);
        }
        body.light-theme { background-image: none; }

        .container { max-width: 600px; margin: 0 auto; }

        /* МИНИМАЛИСТИЧНЫЙ ХЕДЕР */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 70px; 
            background-color: var(--card-bg); 
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; 
            z-index: 999;
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .header-left { display: flex; align-items: center; }
        .header-right { display: flex; align-items: center; }

        /* Кнопка Бургера (теперь справа) */
        .burger-menu-btn {
            background: transparent; border: none; color: var(--primary-color);
            font-size: 26px; cursor: pointer; display: flex; align-items: center;
            padding: 5px; transition: transform 0.2s;
        }
        .burger-menu-btn:hover { transform: scale(1.1); }

        /* БОКОВОЕ МЕНЮ (Сайдбар справа) */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            z-index: 10000; transition: right 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .sidebar.active { right: 0; }

        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }
        .sidebar-close {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 22px; cursor: pointer;
        }
        .sidebar-close:hover { color: var(--accent-red); }

        /* Вкладки навигации */
        .nav-tabs { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .nav-tabs button { 
            background: transparent; color: var(--text-muted); border: none; 
            padding: 14px 16px; border-radius: 10px; cursor: pointer; font-weight: bold; 
            font-size: 15px; transition: all 0.2s; text-align: left; width: 100%;
        }
        .nav-tabs button:hover { color: var(--text-color); background: rgba(255,255,255,0.05); }
        body.light-theme .nav-tabs button:hover { background: rgba(0,0,0,0.05); }

        .nav-tabs button.active { 
            background-color: var(--primary-color); color: #0b0e11; 
            box-shadow: 0 0 15px var(--primary-glow); 
        }

        /* Контейнер настроек внизу сайдбара */
        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Задний фон-затемнение */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 9999; display: none;
        }
        .sidebar-overlay.active { display: block; }

        /* Стилизация селекторов и кнопок темы */
        #language-selector {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-color);
            background-color: var(--input-bg); color: var(--text-color); font-weight: bold; cursor: pointer;
        }
        .btn-theme-toggle {
            width: 100%; background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color);
            padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .btn-theme-toggle:hover { background: var(--primary-glow); }

        /* Кнопки авторизации */
        .user-badge { background-color: var(--primary-color); color: #0b0e11; padding: 8px 14px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .btn-login-trigger { background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-logout { width: 100%; background-color: var(--accent-red); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; }

        /* Карточки контента */
        .card, .tweet, .match-card { 
            background: var(--card-bg); padding: 20px; border-radius: 16px; 
            margin-bottom: 16px; border: 1px solid var(--border-color); 
            box-shadow: 0 4px 25px rgba(0,0,0,0.2);
        }
        h2, h3 { margin-top: 0; color: var(--primary-color); text-transform: uppercase; font-size: 15px; letter-spacing: 0.5px; }
        input, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; 
            border: 1px solid var(--border-color); border-radius: 10px; 
            background-color: var(--input-bg); color: var(--text-color);
        }
        input:focus, textarea:focus { border-color: var(--primary-color); outline: none; }
        button.btn-primary { 
            background-color: var(--primary-color); color: #0b0e11; border: none; 
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px;
        }
        button.btn-primary:hover { box-shadow: 0 0 15px var(--primary-glow); }
        
        .tweet-author { font-weight: bold; color: var(--primary-color); cursor: pointer; }
        .tweet-time { font-size: 12px; color: var(--text-muted); margin-left: 10px; }
        .tweet-content { margin-top: 10px; color: var(--text-color); line-height: 1.5; }
        .tweet-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 12px; margin-top: 10px; }
        .like-btn, .predict-btn { background: var(--input-bg); color: var(--text-muted); padding: 6px 14px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; }
        
        /* Киберспортивные виджеты */
        .winrate-container { display: flex; justify-content: center; margin-top: 10px; }
        .winrate-badge { background: rgba(0, 255, 163, 0.1); color: var(--primary-color); border: 1px solid rgba(0, 255, 163, 0.3); padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .match-card { border-left: 4px solid var(--primary-color); }
        .match-teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; }
        .match-actions { display: flex; gap: 10px; margin-top: 12px; }
        .match-actions button { flex: 1; padding: 8px; font-weight: bold; }
        .profile-header { text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .profile-counters { display: flex; justify-content: center; gap: 20px; font-weight: bold; color: var(--text-muted); margin-top: 10px; }
    </style>
</head>
<body>

<script src="i18n.js"></script>

<!-- Затемнение фона -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<!-- Боковое меню (Выезжает справа) -->
<div class="sidebar" id="sidebarMenu">
    <div>
        <div class="sidebar-header">
            <h3 style="margin:0;">Меню</h3>
            <button class="sidebar-close" onclick="toggleSidebar(false)">✕</button>
        </div>
        <div class="nav-tabs">
            <button id="tab-feed" class="active" onclick="handleTabClick('feed')">💬 Лента</button>
            <button id="tab-my-feed" onclick="handleTabClick('my-feed')">👥 Подписки</button>
            <button id="tab-predictions" onclick="handleTabClick('predictions')">🔮 Прогнозы</button>
            <button id="tab-profile" onclick="handleTabClick('profile-view')">👤 Профиль</button>
            <button id="tab-notifications" onclick="handleTabClick('notifications')">🔔 Уведомления</button>
        </div>
    </div>

    <!-- Второстепенные настройки перенесены сюда -->
    <div class="sidebar-footer">
        <select id="language-selector" onchange="setLanguage(this.value)">
            <option value="ru">🇷🇺 RU</option>
            <option value="en">🇬🇧 EN</option>
        </select>
        <button class="btn-theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
        <div id="sidebar-logout-container"></div>
    </div>
</div>

<!-- Верхняя панель -->
<header>
    <div class="header-left">
        <!-- Слева только никнейм или кнопка авторизации -->
        <div id="header-auth-left"></div>
    </div>

    <div class="header-right">
        <!-- Кнопка меню перемещена в крайний правый угол -->
        <button class="burger-menu-btn" onclick="toggleSidebar(true)">☰</button>
    </div>
</header>

<div class="container">

    <!-- Создание поста -->
    <div id="tweet-box-section">
        <div class="card">
            <h2>Написать твит</h2>
            <textarea id="tweet-content" placeholder="Что нового? Напиши @username!"></textarea>
            <input type="text" id="tweet-image" placeholder="Вставь ссылку на картинку (опционально)">
            <button class="btn-primary" onclick="createTweet()">Твитнуть</button>
        </div>
    </div>

    <!-- Раздел Авторизации -->
    <div class="card" id="auth-section" style="display: none;">
        <h2>Вход / Регистрация</h2>
        <div>
            <input type="text" id="reg-username" placeholder="Никнейм (только для регистрации)">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Пароль">
            <button class="btn-primary" onclick="register()">Создать аккаунт</button>
            <button class="btn-primary" onclick="login()" style="background-color: #55b485; margin-left: 10px;">Войти</button>
        </div>
    </div>

    <!-- Блок Ленты -->
    <div id="feed-section">
        <h2 id="feed-title">Общая лента</h2>
        <div id="tweets-feed"></div>
    </div>

    <!-- Блок Прогнозов -->
    <div id="predictions-section" style="display: none;">
        <h2>Киберспортивные Матчи</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 15px;">Сделай прогноз. Результат отобразится в твоем профиле.</p>
        
        <div class="match-card">
            <div class="match-teams"><span>Natus Vincere</span><span style="color:var(--text-muted)">VS</span><span>Team Spirit</span></div>
            <div style="font-size:11px; color:var(--text-muted); margin-top:5px;">CS2 • Сегодня, 20:00</div>
            <div class="match-actions">
                <button class="predict-btn" onclick="makePrediction('NAVI')">Победа NAVI</button>
                <button class="predict-btn" onclick="makePrediction('Spirit')">Победа Spirit</button>
            </div>
        </div>
    </div>

    <!-- Блок Профиля -->
    <div id="profile-section" style="display: none;">
        <div class="card">
            <div class="profile-header">
                <h2 id="profile-name">@username</h2>
                
                <div class="winrate-container">
                    <span class="winrate-badge" id="profile-winrate">🏆 Прогнозы: 0 / 0</span>
                </div>

                <button id="follow-btn" onclick="toggleFollow()" style="display: none; background-color: var(--primary-color); color:#0b0e11; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; margin-top:10px;">Подписаться</button>
                <div class="profile-counters">
                    <div>Подписчики: <span id="cnt-followers">0</span></div>
                    <div>Подписки: <span id="cnt-following">0</span></div>
                </div>
            </div>
            <h3>Посты пользователя</h3>
            <div id="profile-tweets"></div>
        </div>
    </div>

    <!-- Блок Уведомлений -->
    <div id="notifications-section" style="display: none;">
        <h2>Ваши сообщения и упоминания</h2>
        <div id="notifications-feed"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api';
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let activeProfileId = null; 
    let currentTab = 'feed';

    // Управление Сайдбаром
    function toggleSidebar(open) {
        const sidebar = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');
        if (open) {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        } else {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }
    }

    function handleTabClick(tab) {
        toggleSidebar(false);
        if (tab === 'profile-view') {
            viewMyProfile();
        } else {
            switchTab(tab);
        }
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        if (body.classList.contains('light-theme')) {
            body.classList.remove('light-theme');
            btn.innerText = '☀️ Light';
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.add('light-theme');
            btn.innerText = '🌙 Dark';
            localStorage.setItem('theme', 'light');
        }
    }

    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('theme-btn').innerText = '🌙 Dark';
    }

    function formatTime(dateString) {
        return new Date(dateString).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' ' + new Date(dateString).toLocaleDateString();
    }

    function switchTab(tab) {
        currentTab = tab;
        
        document.getElementById('feed-section').style.display = (tab === 'feed' || tab === 'my-feed') ? 'block' : 'none';
        document.getElementById('predictions-section').style.display = tab === 'predictions' ? 'block' : 'none';
        document.getElementById('profile-section').style.display = tab === 'profile' ? 'block' : 'none';
        document.getElementById('notifications-section').style.display = tab === 'notifications' ? 'block' : 'none';
        document.getElementById('auth-section').style.display = tab === 'auth' ? 'block' : 'none';
        document.getElementById('tweet-box-section').style.display = (tab === 'feed' || tab === 'my-feed') ? 'block' : 'none';

        document.getElementById('tab-feed').className = tab === 'feed' ? 'active' : '';
        document.getElementById('tab-my-feed').className = tab === 'my-feed' ? 'active' : '';
        document.getElementById('tab-predictions').className = tab === 'predictions' ? 'active' : '';
        document.getElementById('tab-profile').className = tab === 'profile' ? 'active' : '';
        document.getElementById('tab-notifications').className = tab === 'notifications' ? 'active' : '';

        if (tab === 'feed') {
            document.getElementById('feed-title').innerText = 'Общая лента';
            loadTweets();
        }
        if (tab === 'my-feed') {
            document.getElementById('feed-title').innerText = 'Лента подписок';
            loadMyFeed();
        }
        if (tab === 'notifications') loadNotifications();
    }

    function updateAuthUI() {
        const leftAuth = document.getElementById('header-auth-left');
        const logoutContainer = document.getElementById('sidebar-logout-container');

        if (currentUser) {
            leftAuth.innerHTML = `<div class="user-badge" style="cursor:pointer;" onclick="handleTabClick('profile-view')">@${currentUser.username}</div>`;
            logoutContainer.innerHTML = `<button class="btn-logout" onclick="logout()">Выйти</button>`;
        } else {
            leftAuth.innerHTML = `<button class="btn-login-trigger" onclick="switchTab('auth')">Войти</button>`;
            logoutContainer.innerHTML = '';
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateAuthUI();
        toggleSidebar(false);
        switchTab('feed');
    }

    function renderTweetsList(tweets, targetElementId, isProfileView = false) {
        const feed = document.getElementById(targetElementId);
        if (!feed) return;
        feed.innerHTML = '';

        if(!tweets || tweets.length === 0) {
            feed.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding: 20px;">Постов пока нет</p>`;
            return;
        }

        tweets.forEach(tweet => {
            let imgHtml = '';
            if (tweet.image_url) {
                imgHtml = `<img src="${tweet.image_url}" class="tweet-img" onerror="this.style.display='none'">`;
            }

            const tweetDiv = document.createElement('div');
            tweetDiv.className = 'tweet';
            tweetDiv.innerHTML = `
                <span class="tweet-author" onclick="viewProfile(${tweet.user_id})">@${tweet.username}</span>
                <span class="tweet-time">${formatTime(tweet.created_at)}</span>
                <div class="tweet-content">${tweet.content}</div>
                ${imgHtml}
                <div style="margin-top:10px;">
                    <button class="like-btn" onclick="toggleLike(${tweet.id}, ${isProfileView})">❤️ ${tweet.likes_count || 0}</button>
                </div>
            `;
            feed.appendChild(tweetDiv);
        });
    }

    async function loadTweets() {
        try {
            const response = await fetch(`${API_URL}/tweets`);
            const tweets = await response.json();
            renderTweetsList(tweets, 'tweets-feed', false);
        } catch (e) { console.error(e); }
    }

    async function loadMyFeed() {
        if (!currentUser) {
            document.getElementById('tweets-feed').innerHTML = `<p style="text-align:center; color:var(--text-muted); padding: 20px;">Войдите, чтобы увидеть подписки</p>`;
            return;
        }
        try {
            const response = await fetch(`${API_URL}/tweets/feed/${currentUser.id}`);
            const tweets = await response.json();
            renderTweetsList(tweets, 'tweets-feed', false);
        } catch (e) { console.error(e); }
    }

    async function viewProfile(userId) {
        activeProfileId = userId;
        try {
            const resProf = await fetch(`${API_URL}/users/${userId}/profile`);
            const profile = await resProf.json();
            
            switchTab('profile');
            
            document.getElementById('profile-name').innerText = `@${profile.username}`;
            document.getElementById('cnt-followers').innerText = profile.followers;
            document.getElementById('cnt-following').innerText = profile.following;
            document.getElementById('profile-winrate').innerText = `🏆 Прогнозы: ${profile.wins || 0} / ${profile.losses || 0}`;

            const followBtn = document.getElementById('follow-btn');
            if (currentUser && currentUser.id !== userId) {
                followBtn.style.display = 'inline-block';
                followBtn.textContent = 'Подписаться';
            } else {
                followBtn.style.display = 'none';
            }

            const resTweets = await fetch(`${API_URL}/users/${userId}/tweets`);
            const tweets = await resTweets.json();
            renderTweetsList(tweets, 'profile-tweets', true);
        } catch (e) { console.error(e); }
    }

    function viewMyProfile() {
        if (!currentUser) return alert('Пожалуйста, авторизуйтесь');
        viewProfile(currentUser.id);
    }

    async function toggleFollow() {
        if (!currentUser) return alert('Пожалуйста, авторизуйтесь');
        await fetch(`${API_URL}/follow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ follower_id: currentUser.id, following_id: activeProfileId })
        });
        viewProfile(activeProfileId);
    }

    async function loadNotifications() {
        if (!currentUser) {
            document.getElementById('notifications-feed').innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted);">Войдите для просмотра уведомлений</p>`;
            return;
        }
        try {
            const response = await fetch(`${API_URL}/notifications/${currentUser.id}`);
            const notes = await response.json();
            const feed = document.getElementById('notifications-feed');
            feed.innerHTML = '';

            if (notes.length === 0) {
                feed.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted);">Упоминаний нет</p>`;
                return;
            }

            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'tweet';
                div.innerHTML = `
                    <p>Вас упомянул <span class="tweet-author" onclick="viewProfile(${note.author_id})">@${note.username}</span>:</p>
                    <div class="tweet-content"><em>${note.content}</em></div>
                    <button class="reply-btn" onclick="replyTo('${note.username}')">↩️ Ответить</button>
                `;
                feed.appendChild(div);
            });
        } catch(e) { console.error(e); }
    }

    function replyTo(username) {
        switchTab('feed');
        document.getElementById('tweet-content').value = `@${username} `;
        document.getElementById('tweet-content').focus();
    }

    async function toggleLike(tweetId, isProfile = false) {
        if (!currentUser) return alert('Нужно войти в систему');
        await fetch(`${API_URL}/likes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: currentUser.id, tweet_id: tweetId })
        });
        if (isProfile) viewProfile(activeProfileId); 
        else if (currentTab === 'my-feed') loadMyFeed();
        else loadTweets();
    }

    async function createTweet() {
        if (!currentUser) return alert('Авторизуйтесь перед публикацией');
        const content = document.getElementById('tweet-content').value;
        const image_url = document.getElementById('tweet-image').value;
        if (!content) return alert('Введите текст твита');

        await fetch(`${API_URL}/tweets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: currentUser.id, content, image_url })
        });
        document.getElementById('tweet-content').value = '';
        document.getElementById('tweet-image').value = '';
        if (currentTab === 'my-feed') loadMyFeed(); else loadTweets();
    }

    function makePrediction(team) {
        if (!currentUser) return alert('Сначала авторизуйтесь!');
        document.getElementById('tweet-content').value = `🔮 Мой киберпрогноз на матч NAVI vs Spirit: Победа команды ${team}! #cyberprognosis`;
        switchTab('feed');
        createTweet();
    }

    async function register() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const response = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        if (response.ok) { login(email, password); } else { alert((await response.json()).error); }
    }

    async function login(emailParam, passwordParam) {
        const email = emailParam || document.getElementById('reg-email').value;
        const password = passwordParam || document.getElementById('reg-password').value;
        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateAuthUI();
                switchTab('feed');
            } else { alert((await response.json()).error); }
        } catch(e) { console.error(e); }
    }

    loadTweets();
    updateAuthUI();

    setInterval(() => {
        if (currentTab === 'feed') loadTweets();
        if (currentTab === 'my-feed') loadMyFeed();
    }, 10000);
</script>
</body>
